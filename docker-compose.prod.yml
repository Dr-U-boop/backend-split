services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: glukoze-api
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - ./medical_app.db:/app/medical_app.db
    expose:
      - "8000"

  reverse-proxy:
    image: nginx:1.27-alpine
    container_name: glukoze-nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/certs:/etc/nginx/certs:ro
