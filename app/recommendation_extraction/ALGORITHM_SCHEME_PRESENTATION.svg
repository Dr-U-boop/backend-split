<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Схема алгоритма интерпретации рекомендаций</title>
  <desc id="desc">Горизонтальная схема для презентации: от текста рекомендации к подготовке текста, поиску параметров, запасному пути распознавания и выдаче результата.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fafc"/>
      <stop offset="100%" stop-color="#edf2f7"/>
    </linearGradient>
    <linearGradient id="bluePanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#69a7dc"/>
      <stop offset="100%" stop-color="#2f6fa8"/>
    </linearGradient>
    <linearGradient id="lightCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f7fa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#94a3b8" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 22px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .blockTitle { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .blockText { font: 500 21px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .panelTitle { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .panelText { font: 500 21px 'Segoe UI', Arial, sans-serif; fill: #eff6ff; }
      .smallLabel { font: 600 20px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
      .arrowLabel { font: 600 20px 'Segoe UI', Arial, sans-serif; fill: #374151; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="url(#bg)"/>

  <text x="800" y="70" text-anchor="middle" class="title">Алгоритм интерпретации текстовых рекомендаций</text>
  <text x="800" y="108" text-anchor="middle" class="subtitle">Упрощённая схема для презентации</text>

  <rect x="40" y="280" width="250" height="250" rx="24" fill="url(#lightCard)" stroke="#94a3b8" stroke-width="3" filter="url(#shadow)"/>
  <text x="165" y="370" text-anchor="middle" class="blockTitle">Текст</text>
  <text x="165" y="412" text-anchor="middle" class="blockTitle">рекомендации</text>
  <text x="165" y="462" text-anchor="middle" class="blockText">Фраза врача</text>
  <text x="165" y="492" text-anchor="middle" class="blockText">в свободной форме</text>

  <rect x="390" y="140" width="640" height="620" rx="28" fill="#f8fafc" stroke="#94a3b8" stroke-width="3" filter="url(#shadow)"/>
  <text x="710" y="190" text-anchor="middle" class="blockTitle">Модуль интерпретации рекомендаций</text>

  <rect x="430" y="230" width="560" height="115" rx="20" fill="url(#lightCard)" stroke="#8aa3bf" stroke-width="2.5"/>
  <text x="710" y="280" text-anchor="middle" class="blockTitle">Подготовка текста</text>
  <text x="710" y="320" text-anchor="middle" class="blockText">исправление частых опечаток, запись времени</text>

  <rect x="430" y="375" width="560" height="105" rx="20" fill="url(#lightCard)" stroke="#8aa3bf" stroke-width="2.5"/>
  <text x="710" y="425" text-anchor="middle" class="blockTitle">Деление на смысловые части</text>
  <text x="710" y="462" text-anchor="middle" class="blockText">если в одной фразе несколько рекомендаций</text>

  <rect x="430" y="510" width="560" height="120" rx="20" fill="url(#lightCard)" stroke="#8aa3bf" stroke-width="2.5"/>
  <text x="710" y="560" text-anchor="middle" class="blockTitle">Поиск параметров</text>
  <text x="710" y="598" text-anchor="middle" class="blockText">тип рекомендации, число, время, условие</text>

  <rect x="430" y="660" width="560" height="70" rx="20" fill="url(#lightCard)" stroke="#8aa3bf" stroke-width="2.5"/>
  <text x="710" y="705" text-anchor="middle" class="blockTitle">Проверка результата и оценка надёжности</text>

  <rect x="1080" y="170" width="410" height="250" rx="28" fill="url(#bluePanel)" stroke="#2c5d8b" stroke-width="3" filter="url(#shadow)"/>
  <text x="1285" y="240" text-anchor="middle" class="panelTitle">Запасной путь</text>
  <text x="1285" y="290" text-anchor="middle" class="panelText">Если точный поиск не дал</text>
  <text x="1285" y="322" text-anchor="middle" class="panelText">готового результата, система</text>
  <text x="1285" y="354" text-anchor="middle" class="panelText">ищет похожие слова и при</text>
  <text x="1285" y="386" text-anchor="middle" class="panelText">необходимости использует</text>
  <text x="1285" y="418" text-anchor="middle" class="panelText">обученную модель</text>

  <rect x="1100" y="525" width="380" height="210" rx="28" fill="url(#bluePanel)" stroke="#2c5d8b" stroke-width="3" filter="url(#shadow)"/>
  <text x="1290" y="590" text-anchor="middle" class="panelTitle">Результат</text>
  <text x="1290" y="640" text-anchor="middle" class="panelText">Один лучший ответ</text>
  <text x="1290" y="675" text-anchor="middle" class="panelText">или список всех</text>
  <text x="1290" y="710" text-anchor="middle" class="panelText">найденных рекомендаций</text>

  <path d="M 290 405 L 390 405" stroke="#111827" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <text x="340" y="390" text-anchor="middle" class="arrowLabel">Вход</text>

  <path d="M 1030 570 L 1080 295" stroke="#111827" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <text x="1065" y="440" text-anchor="middle" class="arrowLabel">Если нужно</text>
  <text x="1065" y="465" text-anchor="middle" class="arrowLabel">уточнение</text>

  <path d="M 1030 695 L 1100 630" stroke="#111827" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <text x="1060" y="675" text-anchor="middle" class="arrowLabel">Готовый ответ</text>

  <path d="M 1285 420 L 1285 525" stroke="#111827" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <text x="1325" y="480" text-anchor="start" class="arrowLabel">Уточнённый</text>
  <text x="1325" y="505" text-anchor="start" class="arrowLabel">результат</text>

  <rect x="470" y="785" width="480" height="64" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="710" y="825" text-anchor="middle" class="smallLabel">Главная идея: сначала точный поиск, затем запасной способ распознавания</text>
</svg>
